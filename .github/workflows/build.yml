name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so Generate-ReleaseNotes.ps1 can resolve the prior tag

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build
        run: >
          dotnet build VirtualDesktop.FaceTracking.csproj -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item bin\Release\net7.0-windows\VirtualDesktop.FaceTracking.dll staging\

          # Stamp the tag version into the bundled module.json
          $json = Get-Content module.json | ConvertFrom-Json
          $json.Version = "${{ steps.version.outputs.version }}"
          $json | ConvertTo-Json | Set-Content staging\module.json

          Compress-Archive -Path staging\* -DestinationPath VirtualDesktop.VRCFaceTracking.zip -Force

      - name: Generate auto-changelog
        id: changelog
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # generate_release_notes: true on softprops/action-gh-release only
          # lists merged PRs; this repo uses direct commits, so we generate
          # the body from git log instead. See .github/scripts/Generate-ReleaseNotes.ps1.
          $body = & ./.github/scripts/Generate-ReleaseNotes.ps1
          if (-not $body) { $body = '_Maintenance release; see commit log for details._' }
          $delim = "EOF_" + [Guid]::NewGuid().ToString('N')
          "body<<$delim" >> $env:GITHUB_OUTPUT
          $body          >> $env:GITHUB_OUTPUT
          $delim         >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: VirtualDesktop.VRCFaceTracking.zip
          draft: false
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
